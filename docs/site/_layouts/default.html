<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a class="site-logo" href="{{ '/' | relative_url }}">dtctl</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/docs/quick-start/' | relative_url }}">Docs</a>
        <a href="{{ '/docs/command-reference/' | relative_url }}">Commands</a>
        <a href="https://github.com/dynatrace-oss/dtctl">GitHub</a>
      </nav>
    </div>
  </header>

  <div id="main_content_wrap" class="outer">
    <section id="main_content" class="inner">
      {{ content }}
    </section>
  </div>

  <footer class="site-footer">
    <p>
      <a href="https://github.com/dynatrace-oss/dtctl">GitHub</a> &middot;
      <a href="https://github.com/dynatrace-oss/dtctl/releases/latest">Releases</a> &middot;
      Apache License 2.0
    </p>
  </footer>

  <script>
    // Add a clickable "#" anchor to every heading that has an id.
    // Kramdown (Jekyll's default Markdown processor) auto-generates the ids,
    // so this just surfaces them as linkable, copyable section anchors.
    (function () {
      var content = document.getElementById('main_content');
      if (!content) return;
      var headings = content.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]');
      headings.forEach(function (heading) {
        var anchor = document.createElement('a');
        anchor.className = 'heading-anchor';
        anchor.href = '#' + heading.id;
        anchor.setAttribute('aria-label', 'Link to this section');
        anchor.textContent = '#';
        heading.appendChild(anchor);
      });
    })();
  </script>

</body>
</html>
